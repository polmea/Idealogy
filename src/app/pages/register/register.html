<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span>💡</span>
      <span class="logo-text">Idealogy</span>
    </div>

    <h1>Create account</h1>
    <p class="auth-sub">Join the idea marketplace</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" formControlName="displayName" placeholder="Alex Kim" autocomplete="name" />
        @if (hasError('displayName')) { <span class="field-error">Name is required.</span> }
      </div>

      <div class="form-group">
        <label>Email *</label>
        <input type="email" formControlName="email" placeholder="you@example.com" autocomplete="email" />
        @if (hasError('email')) { <span class="field-error">Valid email required.</span> }
      </div>

      <div class="form-group">
        <label>Password *</label>
        <input type="password" formControlName="password" placeholder="Min. 6 characters" autocomplete="new-password" />
        @if (hasError('password')) { <span class="field-error">Password must be at least 6 characters.</span> }
      </div>

      <div class="form-group">
        <label>I want to...</label>
        <div class="role-options">
          <label class="role-option" [class.selected]="form.get('role')?.value === 'buyer'">
            <input type="radio" formControlName="role" value="buyer" />
            <span class="role-icon">🛒</span>
            <span>Buy Ideas</span>
          </label>
          <label class="role-option" [class.selected]="form.get('role')?.value === 'seller'">
            <input type="radio" formControlName="role" value="seller" />
            <span class="role-icon">💡</span>
            <span>Sell Ideas</span>
          </label>
          <label class="role-option" [class.selected]="form.get('role')?.value === 'both'">
            <input type="radio" formControlName="role" value="both" />
            <span class="role-icon">🤝</span>
            <span>Both</span>
          </label>
        </div>
      </div>

      <button type="submit" class="auth-btn" [disabled]="form.invalid">
        Create Account
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a routerLink="/login">Sign in</a>
    </div>
  </div>
</div>
