<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span>💡</span>
      <span class="logo-text">Idealogy</span>
    </div>

    <h1>Welcome back</h1>
    <p class="auth-sub">Sign in to your account</p>

    @if (error()) {
      <div class="error-banner">{{ error() }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button type="submit" class="auth-btn" [disabled]="form.invalid || loading()">
        {{ loading() ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a routerLink="/register">Sign up free</a>
    </div>

    <!-- Demo accounts -->
    <div class="demo-section">
      <div class="demo-label">Or try a demo account</div>
      <div class="demo-users">
        @for (user of mockUsers; track user.id) {
          <button class="demo-user" (click)="loginAs(user.id)">
            <div class="demo-avatar">{{ user.avatar }}</div>
            <div class="demo-info">
              <span class="demo-name">{{ user.displayName }}</span>
              <span class="demo-role">{{ user.role }}</span>
            </div>
          </button>
        }
      </div>
    </div>
  </div>
</div>
